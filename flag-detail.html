<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infarm CS — Detail Flag Koreksi</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="pesanan.css" />
  <link rel="stylesheet" href="flag.css" />
</head>
<body>
  <div class="app">

    <!-- ======================= TOP BAR ======================= -->
    <header class="topbar">
      <div class="topbar-left">
        <img class="brand-logo" src="logo-infarm.png" alt="Infarm.ID" />
        <span class="topbar-title">Customer Service Console</span>
      </div>
      <div class="topbar-right">
        <button class="lang-pill">ID ▾</button>
        <button class="icon-btn" title="Statistik">📊</button>
        <button class="icon-btn" title="Notifikasi"><span class="dot-badge">3</span>🔔</button>
        <a class="icon-btn" href="index.html" title="Keluar" style="text-decoration:none">⎋</a>
      </div>
    </header>

    <div class="workspace">

      <!-- ======================= ICON RAIL ======================= -->
      <nav class="rail">
        <a class="rail-btn" href="beranda.html" title="Beranda">🏠</a>
        <a class="rail-btn" href="dashboard.html" title="Chat"><span class="rail-badge">99+</span>💬</a>
        <a class="rail-btn" href="pesanan.html" title="Pesanan">📦</a>
        <a class="rail-btn active" href="ai.html" title="AI Chatbot">🤖</a>
        <a class="rail-btn" href="broadcast.html" title="Broadcast">📣</a>
        <a class="rail-btn" href="statistik.html" title="Statistik">📈</a>
        <div class="rail-spacer"></div>
        <a class="rail-btn" href="settings.html" title="Pengaturan">⚙️</a>
        <a class="rail-btn" href="index.html" title="Akun">👤</a>
      </nav>

      <!-- ======================= FLAG DETAIL CONTENT ======================= -->
      <main class="flagpage">
        <a class="back-link" href="flag-list.html">‹ Kembali ke Daftar Flag</a>

        <!-- Role switcher (demo) -->
        <div class="role-switch-box">
          <span class="role-hint">Tampilan sebagai:</span>
          <div class="role-switch">
            <button class="role-btn" data-role="cs">🧑‍💼 CS Agent</button>
            <button class="role-btn" data-role="admin">🛡️ Admin / Owner</button>
          </div>
          <span class="role-hint" id="roleHint"></span>
        </div>

        <div id="flagDetailRoot"><!-- diisi flag-detail.js --></div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="rail.js"></script>
  <script src="flag-store.js"></script>
  <script src="flag-detail.js"></script>
</body>
</html>
